# Offline deployment: run from pre-built local images (no build, no registry pull).
#
# Required local images:
#   auth-backend:latest
#   auth-frontend:latest
#   auth-recaptcha:latest
#   postgres:15
#   redis:7-alpine
#
# Usage:
#   docker compose -f docker-compose.offline.yml up -d
#
# Runtime config can come from .env (optional); compose defaults and baked config.json apply otherwise.
# Frontend branding/theme/locale are baked into images at build time.
# Backend GeoLite MMDB: run ./scripts/download-mmdb.sh before building auth-backend:latest.

services:
  redis:
    image: redis:7-alpine
    pull_policy: never
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  recaptcha:
    image: auth-recaptcha:latest
    pull_policy: never
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      REDIS_URL: redis://redis:6379/0
      CAPTCHA_SECRET: ${CAPTCHA_SECRET:-change_me}
      CAPTCHA_TTL_SECONDS: ${CAPTCHA_TTL_SECONDS:-120}
      CAPTCHA_PORT: ${CAPTCHA_PORT:-8090}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.environ.get('CAPTCHA_PORT', '8090') + '/api/meta/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3

  db:
    image: postgres:15
    pull_policy: never
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth}
      POSTGRES_USER: ${POSTGRES_USER:-auth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-auth} -d ${POSTGRES_DB:-auth}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: auth-backend:latest
    pull_policy: never
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-8077}
      SQLALCHEMY_DATABASE_URI: ${SQLALCHEMY_DATABASE_URI:-postgresql://auth:change_me@db:5432/auth}
      CAPTCHA_ENABLED: ${CAPTCHA_ENABLED:-true}
      CAPTCHA_SERVICE_URL: ${CAPTCHA_SERVICE_URL:-http://recaptcha:8090}
      CAPTCHA_SECRET: ${CAPTCHA_SECRET:-change_me}
    depends_on:
      db:
        condition: service_healthy
      recaptcha:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.environ.get('BACKEND_PORT', '8077') + '/api/meta/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    volumes:
      - backend_upload:/app/upload

  frontend:
    image: auth-frontend:latest
    pull_policy: never
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      FRONTEND_BASE_PATH: ${FRONTEND_BASE_PATH:-/}
      BACKEND_UPSTREAM: backend:${BACKEND_PORT:-8077}
      CAPTCHA_UPSTREAM: recaptcha:${CAPTCHA_PORT:-8090}
    depends_on:
      backend:
        condition: service_healthy
      recaptcha:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null \"http://127.0.0.1$${FRONTEND_BASE_PATH:-/}\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
  backend_upload:
